# ═══════════════════════════════════════════════════════════════════
# FMS 관제 GUI 설정
#   - 로봇 목록·스테이션·맵·백엔드를 여기서 정의(코드 수정 없이 대수 확장).
# ═══════════════════════════════════════════════════════════════════

# 화면 갱신 주기(초). 배차·작업 FSM 판단 주기이기도 하다.
#   ※ 로봇 제어(cmd_vel)는 이것과 무관하게 20Hz 로 돈다(turtlesim_source.py).
poll_interval_sec: 0.5

# 백엔드:
#   turtlesim = 실제 ROS 2 turtlesim (메인). turtlesim_node 가 떠 있어야 한다.
#   sim2d     = ROS 없이 도는 2D 시뮬(폴백). ROS 없는 PC 에서 UI 만 볼 때.
source: turtlesim

# 관제할 로봇(=거북이) 목록. 대수 늘리려면 항목만 추가하면 됨(코드 무관).
#   id    = turtlesim 거북이 이름 = ROS 네임스페이스 (/turtle1/cmd_vel, /turtle1/pose)
#   x,y   = 초기 위치 (turtlesim 좌표 0~11.09). theta = 초기 방향[rad].
#   앱 시작 시 기본 turtle1 을 지우고 이 목록대로 spawn 한다.
#   battery 생략 시 랜덤 초기값(가상 — turtlesim 엔 배터리 개념이 없다).
robots:
  - {id: turtle1, name: TB-1, x: 2.0, y: 2.0, theta: 0.0}
  - {id: turtle2, name: TB-2, x: 9.0, y: 2.0, theta: 1.57}
  - {id: turtle3, name: TB-3, x: 2.0, y: 9.0, theta: 0.0}
  - {id: turtle4, name: TB-4, x: 9.0, y: 9.0, theta: 3.14}

# 스테이션(픽업/드롭/충전) — 맵 좌표. 맵뷰에 마커로 표시.
stations:
  - {name: PICK-A, x: 1.5, y: 5.5, kind: pickup}
  - {name: DROP-B, x: 9.5, y: 5.5, kind: drop}
  - {name: CHARGE, x: 5.5, y: 1.0, kind: charge}

# 교통관제(traffic.py): 움직이는 두 로봇이 이 거리 안으로 들어오면
#   '우선순위가 낮은 쪽'(= robots 목록에서 아래쪽)이 멈춰서 양보한다.
#   크게 잡을수록 안전하지만 자주 서고, 작게 잡으면 아슬아슬하게 지나간다.
safe_dist: 1.2

# 맵 범위 — turtlesim 창의 실제 크기(0~11.09). 맵뷰 화면과 A* 격자가 공유하는 '창문'.
world: {xmin: 0.0, ymin: 0.0, xmax: 11.09, ymax: 11.09}

# 벽/장애물(창고 선반) — 사각형(x,y=좌하단, w,h=크기). A* 가 이걸 피해 경로를 만든다.
#   ⚠ turtlesim 에는 실제 장애물이 없다 → 이건 '가상 진입금지 구역'.
#     (관제가 경로로 피하게 만드는 것 = nav2 의 costmap 역할을 대신)
#   PICK-A(좌) 와 DROP-B(우) 사이를 가로막아, 로봇이 위/아래로 돌아가게 만든다.
walls:
  - {x: 5.0, y: 3.0, w: 1.0, h: 5.5}   # 중앙 선반 (좌우 통로 분리)
  - {x: 7.5, y: 0.5, w: 1.0, h: 1.5}   # 선반 2
